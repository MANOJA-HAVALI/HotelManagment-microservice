spring:
  application:
    name: Hotel-Service

  datasource:
    url: jdbc:postgresql://localhost:5432/microservice
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8081

logging:
  level:
    com.hotel.service.HotelService.util.SecurityUtils: DEBUG
    com.hotel.service.HotelService.security.AuthServiceTokenFilter: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.filter: DEBUG

