spring:
  application:
    name: RATING-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/microservice_rating
    username: root
    password: MySql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8082